<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyLab Pro</title>
    <style>
        :root {
            --primary: #2ea44f;
            --danger: #cf222e;
            --bg: #0d1117; /* GitHub Dark Path */
            --card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 0 1.5rem;
            height: 60px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; letter-spacing: -0.5px; font-size: 1.2rem; color: #fff; }
        .logo span { color: var(--primary); }

        /* --- Main Layout --- */
        main {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
            height: calc(100vh - 60px);
        }

        /* --- Left Side: Video Theater --- */
        .stage {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
        }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            background: rgba(255,255,255,0.03);
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        select {
            flex: 1;
            background: #0d1117;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .video-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        video { max-width: 100%; max-height: 100%; outline: none; }

        /* --- Right Side: Panel --- */
        .panel {
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .status-bar { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px; }
        .video-title { margin: 0 0 1.5rem 0; font-size: 1rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Decision Buttons --- */
        .decision-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .decision-grid input { display: none; }
        .decision-grid label {
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            background: rgba(255,255,255,0.02);
        }

        #safe:checked + label { border-color: var(--primary); color: var(--primary); background: rgba(46, 164, 79, 0.1); }
        #unsafe:checked + label { border-color: var(--danger); color: var(--danger); background: rgba(207, 34, 46, 0.1); }

        /* --- Hazard Checklist --- */
        #hazardSection {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 8px;
        }

        .hazard-item {
            position: relative;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
        }

        .hazard-item:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.05); }

        .hazard-label { cursor: pointer; font-size: 13.5px; display: block; width: 100%; }

        /* --- Clean Tooltip --- */
        .tooltip-text {
            visibility: hidden;
            width: 220px;
            background: #fff;
            color: #000;
            padding: 10px;
            border-radius: 8px;
            position: absolute;
            z-index: 100;
            right: 110%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
        }
        .hazard-item:hover .tooltip-text { visibility: visible; opacity: 1; }

        /* --- Action Button --- */
        button#nextBtn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(46, 164, 79, 0.4);
        }

        button#nextBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46, 164, 79, 0.5); }
        button:disabled { opacity: 0.3; filter: grayscale(1); }

        .hidden { display: none; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">SAFETY<span>LAB</span></div>
    <div id="sessionStatus" style="font-size: 12px; color: var(--text-muted);">
        Waiting for input...
    </div>
</header>

<main>
    <section class="stage">
        <div class="toolbar">
            <select id="caseStudySelect" onchange="loadEnvironments()">
                <option value="">📁 Select Case Study</option>
            </select>
            <select id="envSelect" onchange="startAssessment()" disabled>
                <option value="">📍 Select Environment</option>
            </select>
        </div>

        <div class="video-container">
            <video id="mainPlayer" controls playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>
        </div>
    </section>

    <section class="panel">
        <div id="assessmentArea" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="status-bar" id="progressCounter">Progress: 0%</div>
            <h1 class="video-title" id="videoNameDisplay">Filename.mp4</h1>

            <form id="safetyForm" style="display: flex; flex-direction: column; flex-grow: 1;">
                <div class="decision-grid">
                    <input type="radio" id="safe" name="safety" value="safe" onclick="toggleHazard(false)">
                    <label for="safe">SAFE</label>
                    
                    <input type="radio" id="unsafe" name="safety" value="unsafe" onclick="toggleHazard(true)">
                    <label for="unsafe">UNSAFE</label>
                </div>

                <div id="hazardSection" class="hidden">
                    <div id="checkboxContainer"></div>
                </div>

                <button type="button" id="nextBtn" onclick="submitAndNext()">SUBMIT & NEXT</button>
            </form>
        </div>
    </section>
</main>
    <script>
        let manifest = {}; 
        let videoList = [];
        let currentIndex = 0;
        let sessionAnswers = []; // Array to store the results

        let taxonomies = {}; // Loaded from taxonomies.json

        async function init() {
            // Load both manifests and taxonomies
            const manifestResp = await fetch('manifest.json');
            manifest = await manifestResp.json();
            
            const taxResp = await fetch('taxonomies.json');
            taxonomies = await taxResp.json();

            const select = document.getElementById('caseStudySelect');
            select.innerHTML = '<option value="">-- Choose Case Study --</option>';
            Object.keys(manifest).sort().forEach(caseName => {
                select.add(new Option(caseName, caseName));
            });
        }

        function toggleHazard(show) {
            const section = document.getElementById('hazardSection');
            if (show) {
                buildHazardCheckboxes();
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }
        }

        function buildHazardCheckboxes() {
            const caseName = document.getElementById('caseStudySelect').value;
            const container = document.getElementById('checkboxContainer');
            container.innerHTML = ""; // Clear old checkboxes

            // Determine which taxonomy to use (UAV or Humanoid)
            // Simple logic: check if the case name contains the keywords
            let type = "UAV"; 
            if (caseName.toLowerCase().includes("humanoid")) type = "Humanoid";

            const currentTax = taxonomies[type];

            Object.entries(currentTax).forEach(([code, label]) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <input type="checkbox" id="${code}" name="hazard" value="${code}">
                    <label for="${code}"><strong>${code}:</strong> ${label}</label>
                `;
                container.appendChild(div);
            });
        }

        function submitAndNext() {
            const selectedRating = document.querySelector('input[name="safety"]:checked');
            if (!selectedRating) {
                alert("Please select a safety rating.");
                return;
            }

            // Collect all checked hazards
            const checkedHazards = Array.from(document.querySelectorAll('input[name="hazard"]:checked'))
                                        .map(cb => cb.value);

            if (selectedRating.value === 'unsafe' && checkedHazards.length === 0) {
                alert("Please select at least one hazard category.");
                return;
            }

            const caseName = document.getElementById('caseStudySelect').value;
            const envName = document.getElementById('envSelect').value;
            
            // Save answer
            sessionAnswers.push({
                caseStudy: caseName,
                environment: envName,
                videoName: videoList[currentIndex].name,
                safetyRating: selectedRating.value,
                hazards: selectedRating.value === 'unsafe' ? checkedHazards : [],
                timestamp: new Date().toISOString()
            });

            currentIndex++;
            if (currentIndex < videoList.length) {
                loadVideo();
                toggleHazard(false);
            } else {
                downloadResults(caseName, envName);
            }
        }

        function loadEnvironments() {
            const caseName = document.getElementById('caseStudySelect').value;
            const envSelect = document.getElementById('envSelect');
            document.getElementById('assessmentArea').classList.add('hidden');
            envSelect.innerHTML = '<option value="">-- Choose Environment --</option>';
            
            if (caseName && manifest[caseName]) {
                envSelect.disabled = false;
                Object.keys(manifest[caseName]).sort().forEach(envName => {
                    envSelect.add(new Option(envName, envName));
                });
            } else {
                envSelect.disabled = true;
            }
        }

        function startAssessment() {
            const caseName = document.getElementById('caseStudySelect').value;
            const envName = document.getElementById('envSelect').value;
            
            if (!caseName || !envName) return;

            videoList = manifest[caseName][envName];
            currentIndex = 0;
            sessionAnswers = []; // Reset answers for the new environment

            if (videoList && videoList.length > 0) {
                document.getElementById('assessmentArea').classList.remove('hidden');
                loadVideo();
            }
        }

        function loadVideo() {
            const videoData = videoList[currentIndex];
            document.getElementById('videoNameDisplay').innerText = videoData.name;
            document.getElementById('progressCounter').innerText = `Video ${currentIndex + 1} of ${videoList.length}`;
            
            const player = document.getElementById('mainPlayer');
            const source = document.getElementById('videoSource');
            
            source.src = videoData.url; 
            player.load();
            document.getElementById('safetyForm').reset();
        }

        function downloadResults(caseName, envName) {
            // Create the JSON file
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sessionAnswers, null, 4));
            const downloadAnchorNode = document.createElement('a');
            
            // Format filename: CaseName_EnvName_Results.json
            const filename = `${caseName}_${envName}_results.json`.replace(/\s+/g, '_');
            
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", filename);
            document.body.appendChild(downloadAnchorNode); 
            
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            alert("Assessment Complete! Your results file has been downloaded.");
            document.getElementById('assessmentArea').classList.add('hidden');
        }
        function buildHazardCheckboxes() {
            const caseName = document.getElementById('caseStudySelect').value;
            const container = document.getElementById('checkboxContainer');
            container.innerHTML = ""; 
        
            // Determine taxonomy type
            let type = "UAV"; 
            if (caseName.toLowerCase().includes("humanoid")) type = "Humanoid";
        
            const currentTax = taxonomies[type];
        
            if (!currentTax) return;
        
            Object.entries(currentTax).forEach(([code, info]) => {
                const div = document.createElement('div');
                div.className = "hazard-item";
                
                // We wrap the input and text in a way that the whole area 
                // feels interactive and supports the tooltip positioning.
                div.innerHTML = `
                    <div style="display: flex; align-items: flex-start; gap: 10px;">
                        <input type="checkbox" id="${code}" name="hazard" value="${code}" style="margin-top: 4px;">
                        <label for="${code}" class="hazard-label" style="flex-grow: 1; font-size: 14px; cursor: pointer;">
                            <strong>${code}</strong> — ${info.title}
                            <span class="tooltip-text">${info.description}</span>
                        </label>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
