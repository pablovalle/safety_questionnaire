<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyLab Assessment</title>
    <style>
        :root {
            --primary: #2ea44f;
            --danger: #d73a49;
            --bg: #ffffff;
            --surface: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-out; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* --- Progress Bar --- */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #eee;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(46, 164, 79, 0.5);
            transition: width 0.4s ease;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 20px 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .selectors { display: flex; gap: 10px; }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 13px;
        }

        /* --- Video Section --- */
        .video-section {
            flex: 0 1 auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            height: 40vh; 
        }

        video { height: 100%; width: auto; background: #000; }

        /* --- Assessment Section --- */
        .assessment-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .decision-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .decision-group input { display: none; }
        .decision-group label {
            padding: 14px;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: #fff;
        }

        #safe:checked + label { border-color: var(--primary); color: var(--primary); background: #f0fff4; }
        #unsafe:checked + label { border-color: var(--danger); color: var(--danger); background: #fff5f5; }

        /* --- Hazards Grid --- */
        #hazardSection {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        #checkboxContainer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .hazard-item {
            background: #fff;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            position: relative;
        }

        .hazard-label { cursor: pointer; flex-grow: 1; }

        /* --- Tooltip --- */
        .tooltip-text {
            visibility: hidden;
            width: 220px;
            background: #24292f;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            position: absolute;
            z-index: 100;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            font-size: 11px;
            pointer-events: none;
        }
        .hazard-item:hover .tooltip-text { visibility: visible; opacity: 1; }

        button#nextBtn {
            width: 100%;
            padding: 16px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button#nextBtn:hover { background: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="progress-container"><div id="progressBar"></div></div>

    <main>
        <div class="header-nav">
            <div style="font-weight: 800; font-size: 18px;">SAFETY<span style="color:var(--primary)">LAB</span></div>
            <div class="selectors">
                <select id="caseStudySelect" onchange="loadEnvironments()">
                    <option value="">Loading Manifest...</option>
                </select>
                <select id="envSelect" onchange="startAssessment()" disabled>
                    <option value="">Select Environment</option>
                </select>
            </div>
        </div>

        <div class="video-section">
            <video id="mainPlayer" controls playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>
        </div>

        <div id="assessmentArea" class="assessment-card hidden">
            <div class="meta-info">
                <span id="videoNameDisplay" style="font-weight: 600; font-size: 14px;">filename.mp4</span>
                <span id="progressText" style="font-size: 12px; color: #666;">Video 0/0</span>
            </div>

            <form id="safetyForm" style="display:contents">
                <div class="decision-group">
                    <input type="radio" id="safe" name="safety" value="safe" onclick="toggleHazard(false)">
                    <label for="safe">SAFE</label>
                    
                    <input type="radio" id="unsafe" name="safety" value="unsafe" onclick="toggleHazard(true)">
                    <label for="unsafe">UNSAFE</label>
                </div>

                <div id="hazardSection" class="hidden">
                    <div id="checkboxContainer"></div>
                </div>

                <button type="button" id="nextBtn" onclick="submitAndNext()">SUBMIT & NEXT</button>
            </form>
        </div>
    </main>

    <script>
        let manifest = {}; 
        let taxonomies = {}; 
        let videoList = [];
        let currentIndex = 0;
        let sessionAnswers = [];

        async function init() {
            try {
                // Load Manifest
                const mResp = await fetch('manifest.json');
                manifest = await mResp.json();
                
                // Load Taxonomy
                const tResp = await fetch('taxonomies.json');
                taxonomies = await tResp.json();

                const select = document.getElementById('caseStudySelect');
                select.innerHTML = '<option value="">-- Choose Case Study --</option>';
                Object.keys(manifest).sort().forEach(c => select.add(new Option(c, c)));
            } catch (e) {
                console.error("Initialization Error:", e);
                document.getElementById('caseStudySelect').innerHTML = '<option>Error loading JSON</option>';
            }
        }

        function loadEnvironments() {
            const caseName = document.getElementById('caseStudySelect').value;
            const envSelect = document.getElementById('envSelect');
            document.getElementById('assessmentArea').classList.add('hidden');
            envSelect.innerHTML = '<option value="">-- Choose Environment --</option>';
            
            if (caseName && manifest[caseName]) {
                envSelect.disabled = false;
                Object.keys(manifest[caseName]).sort().forEach(e => envSelect.add(new Option(e, e)));
            }
        }

        function startAssessment() {
            const c = document.getElementById('caseStudySelect').value;
            const e = document.getElementById('envSelect').value;
            if (!c || !e) return;

            videoList = manifest[c][e];
            currentIndex = 0;
            sessionAnswers = []; 

            if (videoList.length > 0) {
                document.getElementById('assessmentArea').classList.remove('hidden');
                loadVideo();
            }
        }

        function loadVideo() {
            const videoData = videoList[currentIndex];
            document.getElementById('videoNameDisplay').innerText = videoData.name;
            
            const player = document.getElementById('mainPlayer');
            const source = document.getElementById('videoSource');
            
            source.src = videoData.url; 
            player.load();
            
            document.getElementById('safetyForm').reset();
            toggleHazard(false);
            updateProgressUI();
        }

        function updateProgressUI() {
            const total = videoList.length;
            const current = currentIndex + 1;
            const percent = (currentIndex / total) * 100;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = `Video ${current} / ${total}`;
        }

        function toggleHazard(show) {
            const section = document.getElementById('hazardSection');
            if (show) {
                buildHazardCheckboxes();
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }
        }

        function buildHazardCheckboxes() {
            const caseName = document.getElementById('caseStudySelect').value;
            const container = document.getElementById('checkboxContainer');
            container.innerHTML = ""; 

            let type = caseName.toLowerCase().includes("humanoid") ? "Humanoid" : "UAV";
            const currentTax = taxonomies[type];

            Object.entries(currentTax).forEach(([code, info]) => {
                const div = document.createElement('div');
                div.className = "hazard-item";
                div.innerHTML = `
                    <input type="checkbox" id="${code}" name="hazard" value="${code}">
                    <label for="${code}" class="hazard-label">
                        <strong>${code}</strong>: ${info.title}
                        <span class="tooltip-text">${info.description}</span>
                    </label>
                `;
                container.appendChild(div);
            });
        }

        function submitAndNext() {
            const selectedRating = document.querySelector('input[name="safety"]:checked');
            if (!selectedRating) { alert("Please select a safety rating."); return; }

            const checkedHazards = Array.from(document.querySelectorAll('input[name="hazard"]:checked')).map(cb => cb.value);
            if (selectedRating.value === 'unsafe' && checkedHazards.length === 0) {
                alert("Please select at least one hazard."); return;
            }

            sessionAnswers.push({
                video: videoList[currentIndex].name,
                rating: selectedRating.value,
                hazards: checkedHazards,
                timestamp: new Date().toISOString()
            });

            currentIndex++;
            if (currentIndex < videoList.length) {
                loadVideo();
            } else {
                // Final Progress update before download
                document.getElementById('progressBar').style.width = '100%';
                downloadResults();
            }
        }

        function downloadResults() {
            const caseName = document.getElementById('caseStudySelect').value;
            const envName = document.getElementById('envSelect').value;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sessionAnswers, null, 4));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `${caseName}_${envName}_results.json`);
            dlAnchor.click();
            alert("Done! Results downloaded.");
            document.getElementById('assessmentArea').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
