<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyLab Assessment</title>
    <style>
        :root {
            --primary: #2ea44f;
            --danger: #d73a49;
            --bg: #ffffff;
            --surface: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-out; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* No scroll */
        }

        /* --- Progress Bar --- */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #eee;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(46, 164, 79, 0.5);
        }

        /* --- Layout --- */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 20px 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- Header/Controls --- */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .selectors { display: flex; gap: 10px; }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 13px;
            outline: none;
        }

        /* --- Video Section --- */
        .video-section {
            flex: 0 1 auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            max-height: 45vh; /* Reduced size */
        }

        video { max-height: 100%; max-width: 100%; }

        /* --- Assessment Section --- */
        .assessment-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .decision-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .decision-group input { display: none; }
        .decision-group label {
            padding: 12px;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: #fff;
        }

        #safe:checked + label { border-color: var(--primary); color: var(--primary); background: #f0fff4; }
        #unsafe:checked + label { border-color: var(--danger); color: var(--danger); background: #fff5f5; }

        /* --- Hazards Grid --- */
        #hazardSection {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns for efficiency */
            gap: 10px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        .hazard-item {
            background: #fff;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            position: relative;
        }

        .hazard-item:hover { border-color: var(--primary); }

        /* --- Tooltip --- */
        .tooltip-text {
            visibility: hidden;
            width: 200px;
            background: #24292f;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            font-size: 11px;
            pointer-events: none;
        }
        .hazard-item:hover .tooltip-text { visibility: visible; opacity: 1; }

        /* --- Submit Button --- */
        button#nextBtn {
            width: 100%;
            padding: 16px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button#nextBtn:hover { background: #000; transform: translateY(-1px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="progress-container"><div id="progressBar"></div></div>

    <main>
        <div class="header-nav">
            <div style="font-weight: 800; font-size: 18px;">SAFETY<span style="color:var(--primary)">LAB</span></div>
            <div class="selectors">
                <select id="caseStudySelect" onchange="loadEnvironments()">
                    <option value="">Case Study</option>
                </select>
                <select id="envSelect" onchange="startAssessment()" disabled>
                    <option value="">Environment</option>
                </select>
            </div>
        </div>

        <div class="video-section">
            <video id="mainPlayer" controls playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>
        </div>

        <div id="assessmentArea" class="assessment-card hidden">
            <div class="meta-info">
                <span id="videoNameDisplay" style="font-weight: 600; font-size: 14px;">filename.mp4</span>
                <span id="progressText" style="font-size: 12px; color: #666;">Video 0/0</span>
            </div>

            <form id="safetyForm" style="display:contents">
                <div class="decision-group">
                    <input type="radio" id="safe" name="safety" value="safe" onclick="toggleHazard(false)">
                    <label for="safe">SAFE</label>
                    
                    <input type="radio" id="unsafe" name="safety" value="unsafe" onclick="toggleHazard(true)">
                    <label for="unsafe">UNSAFE</label>
                </div>

                <div id="hazardSection" class="hidden">
                    <div id="checkboxContainer" style="display: contents;"></div>
                </div>

                <button type="button" id="nextBtn" onclick="submitAndNext()">SUBMIT & DOWNLOAD RESULTS</button>
            </form>
        </div>
    </main>
    <script>
        let manifest = {}; 
        let videoList = [];
        let currentIndex = 0;
        let sessionAnswers = []; // Array to store the results

        let taxonomies = {}; // Loaded from taxonomies.json

        async function init() {
            // Load both manifests and taxonomies
            const manifestResp = await fetch('manifest.json');
            manifest = await manifestResp.json();
            
            const taxResp = await fetch('taxonomies.json');
            taxonomies = await taxResp.json();

            const select = document.getElementById('caseStudySelect');
            select.innerHTML = '<option value="">-- Choose Case Study --</option>';
            Object.keys(manifest).sort().forEach(caseName => {
                select.add(new Option(caseName, caseName));
            });
        }
        function updateProgressUI() {
            const percent = ((currentIndex) / videoList.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = `Video ${currentIndex + 1} / ${videoList.length}`;
        }
        function toggleHazard(show) {
            const section = document.getElementById('hazardSection');
            if (show) {
                buildHazardCheckboxes();
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }
        }

        function buildHazardCheckboxes() {
            const caseName = document.getElementById('caseStudySelect').value;
            const container = document.getElementById('checkboxContainer');
            container.innerHTML = ""; // Clear old checkboxes

            // Determine which taxonomy to use (UAV or Humanoid)
            // Simple logic: check if the case name contains the keywords
            let type = "UAV"; 
            if (caseName.toLowerCase().includes("humanoid")) type = "Humanoid";

            const currentTax = taxonomies[type];

            Object.entries(currentTax).forEach(([code, label]) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <input type="checkbox" id="${code}" name="hazard" value="${code}">
                    <label for="${code}"><strong>${code}:</strong> ${label}</label>
                `;
                container.appendChild(div);
            });
        }

        function submitAndNext() {
            const selectedRating = document.querySelector('input[name="safety"]:checked');
            if (!selectedRating) {
                alert("Please select a safety rating.");
                return;
            }

            // Collect all checked hazards
            const checkedHazards = Array.from(document.querySelectorAll('input[name="hazard"]:checked'))
                                        .map(cb => cb.value);

            if (selectedRating.value === 'unsafe' && checkedHazards.length === 0) {
                alert("Please select at least one hazard category.");
                return;
            }

            const caseName = document.getElementById('caseStudySelect').value;
            const envName = document.getElementById('envSelect').value;
            
            // Save answer
            sessionAnswers.push({
                caseStudy: caseName,
                environment: envName,
                videoName: videoList[currentIndex].name,
                safetyRating: selectedRating.value,
                hazards: selectedRating.value === 'unsafe' ? checkedHazards : [],
                timestamp: new Date().toISOString()
            });

            currentIndex++;
            if (currentIndex < videoList.length) {
                loadVideo();
                toggleHazard(false);
            } else {
                downloadResults(caseName, envName);
            }
        }

        function loadEnvironments() {
            const caseName = document.getElementById('caseStudySelect').value;
            const envSelect = document.getElementById('envSelect');
            document.getElementById('assessmentArea').classList.add('hidden');
            envSelect.innerHTML = '<option value="">-- Choose Environment --</option>';
            
            if (caseName && manifest[caseName]) {
                envSelect.disabled = false;
                Object.keys(manifest[caseName]).sort().forEach(envName => {
                    envSelect.add(new Option(envName, envName));
                });
            } else {
                envSelect.disabled = true;
            }
        }

        function startAssessment() {
            const caseName = document.getElementById('caseStudySelect').value;
            const envName = document.getElementById('envSelect').value;
            
            if (!caseName || !envName) return;

            videoList = manifest[caseName][envName];
            currentIndex = 0;
            sessionAnswers = []; // Reset answers for the new environment

            if (videoList && videoList.length > 0) {
                document.getElementById('assessmentArea').classList.remove('hidden');
                loadVideo();
            }
        }

        function loadVideo() {
            const videoData = videoList[currentIndex];
            document.getElementById('videoNameDisplay').innerText = videoData.name;
            document.getElementById('progressCounter').innerText = `Video ${currentIndex + 1} of ${videoList.length}`;
            
            const player = document.getElementById('mainPlayer');
            const source = document.getElementById('videoSource');
            
            source.src = videoData.url; 
            player.load();
            document.getElementById('safetyForm').reset();
        }

        function downloadResults(caseName, envName) {
            // Create the JSON file
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sessionAnswers, null, 4));
            const downloadAnchorNode = document.createElement('a');
            
            // Format filename: CaseName_EnvName_Results.json
            const filename = `${caseName}_${envName}_results.json`.replace(/\s+/g, '_');
            
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", filename);
            document.body.appendChild(downloadAnchorNode); 
            
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            alert("Assessment Complete! Your results file has been downloaded.");
            document.getElementById('assessmentArea').classList.add('hidden');
        }
        function buildHazardCheckboxes() {
            const caseName = document.getElementById('caseStudySelect').value;
            const container = document.getElementById('checkboxContainer');
            container.innerHTML = ""; 
        
            // Determine taxonomy type
            let type = "UAV"; 
            if (caseName.toLowerCase().includes("humanoid")) type = "Humanoid";
        
            const currentTax = taxonomies[type];
        
            if (!currentTax) return;
        
            Object.entries(currentTax).forEach(([code, info]) => {
                const div = document.createElement('div');
                div.className = "hazard-item";
                
                // We wrap the input and text in a way that the whole area 
                // feels interactive and supports the tooltip positioning.
                div.innerHTML = `
                    <div style="display: flex; align-items: flex-start; gap: 10px;">
                        <input type="checkbox" id="${code}" name="hazard" value="${code}" style="margin-top: 4px;">
                        <label for="${code}" class="hazard-label" style="flex-grow: 1; font-size: 14px; cursor: pointer;">
                            <strong>${code}</strong> — ${info.title}
                            <span class="tooltip-text">${info.description}</span>
                        </label>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
